# template-openclaw.yml
# This is a fragment/template for spawning new instances dynamically.
# The Panel will inject {client_id} and {client_domain}

version: '3.8'

services:
  openclaw-instance-{client_id}:
    image: openclaw/openclaw:latest
    container_name: openclaw-{client_id}
    restart: always
    networks:
      - client_net_{client_id}
      - orchestrator_net # Needed so Traefik can reach it
    volumes:
      - /opt/openclaw-orchestrator/volumes/{client_id}:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.claw-{client_id}.rule=Host(`{client_id}.{client_domain}`)"
      - "traefik.http.routers.claw-{client_id}.entrypoints=websecure"
      - "traefik.http.routers.claw-{client_id}.tls.certresolver=myresolver"
      - "traefik.http.services.claw-{client_id}.loadbalancer.server.port=8080" # Adjust port as needed

networks:
  client_net_{client_id}:
    name: client_net_{client_id}
    driver: bridge
  orchestrator_net:
    external: true
