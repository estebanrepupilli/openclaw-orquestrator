api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "tcp://socket-proxy:2375" # Connects to the secure proxy, not the socket
    exposedByDefault: false
    network: orchestrator_net

certificatesResolvers:
  myresolver:
    acme:
      email: admin@midominio.com
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web
